name: Generate AdC Roadmap

on:
  push:
    paths:
      - 'triggers/latest.txt'
  workflow_dispatch:
    inputs:
      call_id:
        description: "Fathom Call ID (laisser vide = dernier appel AdC)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate roadmap
        env:
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTPUT_DIR: output
        run: |
          MANUAL_ID="${{ github.event.inputs.call_id }}"
          if [ -n "$MANUAL_ID" ]; then
            python src/generate.py --call-id "$MANUAL_ID"
          else
            python src/generate.py --latest
          fi

      - name: Commit generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AdC Roadmap Bot"
          git add output/
          git diff --staged --quiet || git commit -m "Feuille de route generee [$(date +'%Y-%m-%d %H:%M')]"
          git push

      - name: Send email with link and analysis
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          import os
          import json
          from pathlib import Path

          password = os.environ["GMAIL_APP_PASSWORD"]

          url = Path("output/DERNIERE-URL.txt").read_text().strip()
          wa_msg = Path("output/DERNIER-MESSAGE-WA.txt").read_text().strip()

          analysis_files = list(Path("output").glob("analysis-*.json"))
          analysis = {}
          if analysis_files:
              latest = max(analysis_files, key=lambda f: f.stat().st_mtime)
              analysis = json.loads(latest.read_text())

          chaleur = analysis.get("niveau_chaleur", "N/A").upper()
          timing = analysis.get("timing_r2", "N/A")
          potentiel = "\n".join(f"  - {p}" for p in analysis.get("potentiel_laisse_table", []))
          objections = "\n".join(f"  - {o}" for o in analysis.get("objections_cachees", []))

          body = f"""NOUVELLE FEUILLE DE ROUTE GENEREE
==========================================

LIEN A ENVOYER AU PROSPECT :
{url}

==========================================
MESSAGE WHATSAPP (copie-colle directement) :

{wa_msg}

==========================================
ANALYSE DU CALL :

Niveau de chaleur : {chaleur}
Timing R2 recommande : {timing}

Potentiel laisse sur la table :
{potentiel}

Objections cachees a pre-traiter en R2 :
{objections}

==========================================
"""

          msg = MIMEMultipart()
          msg["From"] = "jimmy.poupardin28@gmail.com"
          msg["To"] = "jimmy.poupardin28@gmail.com"
          msg["Subject"] = f"Roadmap generee - {url.split('/')[-1]}"
          msg.attach(MIMEText(body, "plain"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login("jimmy.poupardin28@gmail.com", password)
              server.send_message(msg)

          print("Email envoye !")
          EOF
