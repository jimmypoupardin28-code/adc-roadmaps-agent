name: Generate AdC Roadmap

on:
  repository_dispatch:
    types: [fathom_call_completed]
  workflow_dispatch:
    inputs:
      call_id:
        description: "Fathom Call ID (laisser vide = dernier appel AdC)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate roadmap
        env:
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTPUT_DIR: output
        run: |
          MANUAL_ID="${{ github.event.inputs.call_id }}"
          if [ -n "$MANUAL_ID" ]; then
            python src/generate.py --call-id "$MANUAL_ID"
          else
            python src/generate.py --latest
          fi

      - name: Commit generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AdC Roadmap Bot"
          git add output/
git diff --staged --quiet || git commit -m "Feuille de route generee [$(date +'%Y-%m-%d %H:%M')]"
git pull --rebase origin main
git push

      - name: Send email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python src/send_email.py
