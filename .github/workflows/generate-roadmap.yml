name: Generate AdC Roadmap

on:
  push:
    paths:
      - 'triggers/latest.txt'
  workflow_dispatch:
    inputs:
      call_id:
        description: "Fathom Call ID (laisser vide = dernier appel AdC)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate roadmap
        env:
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTPUT_DIR: output
        run: |
          MANUAL_ID="${{ github.event.inputs.call_id }}"
          if [ -n "$MANUAL_ID" ]; then
            python src/generate.py --call-id "$MANUAL_ID"
          else
            python src/generate.py --latest
          fi

      - name: Commit generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AdC Roadmap Bot"
          git add output/
          git diff --staged --quiet || git commit -m "Feuille de route générée [$(date +'%Y-%m-%d %H:%M')]"
          git push

      - name: Send email with link
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          URL=$(cat output/DERNIERE-URL.txt)
          python - <<EOF
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          import os

          url = open("output/DERNIERE-URL.txt").read().strip()
          password = os.environ["GMAIL_APP_PASSWORD"]

          msg = MIMEMultipart()
          msg["From"] = "jimmy.poupardin28@gmail.com"
          msg["To"] = "jimmy.poupardin28@gmail.com"
          msg["Subject"] = "Feuille de route generee"

          body = f"""Nouvelle feuille de route generee.

          Lien direct :
          {url}

          Envoie ce lien au prospect via WhatsApp.
          """
          msg.attach(MIMEText(body, "plain"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login("jimmy.poupardin28@gmail.com", password)
              server.send_message(msg)

          print("Email envoye !")
          EOF
